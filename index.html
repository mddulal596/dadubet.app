<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DaduBet - বিকাশ রকেট নগদ</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">DADU<span>BET</span></div>
        <div class="balance-box">
            <i class="fas fa-wallet" style="color: #ffc107;"></i> ৳ <span id="balanceDisplay">500.00</span>
        </div>
    </header>

    <div class="promo-banner">
        <h2>লাকি ড্র শুরু হয়েছে!</h2>
        <p style="font-size: 12px; opacity: 0.8;">জিতুন বিশাল আকর্ষণীয় পুরষ্কার</p>
        <i class="fas fa-trophy"></i>
    </div>

    <div class="wallet-actions">
        <button class="action-btn dep-btn" onclick="showModal('deposit')">ডিপোজিট</button>
        <button class="action-btn wit-btn" onclick="showModal('withdraw')">উইথড্র</button>
    </div>

    <div style="padding: 10px 15px; font-size: 14px; font-weight: 600;">জনপ্রিয় গেম</div>
    <main class="game-grid">
        <div class="game-card">
            <img src="https://picsum.photos/id/102/300/200" alt="G">
            <div class="game-info">Sweet Bonanza</div>
        </div>
        <div class="game-card">
            <img src="https://picsum.photos/id/103/300/200" alt="G">
            <div class="game-info">Gates of Olympus</div>
        </div>
    </main>

    <div id="actionModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle" style="margin-bottom: 15px;">ডিপোজিট</h3>
            
            <p style="font-size: 12px; color: #94a3b8; text-align: left;">মেথড সিলেক্ট করুন:</p>
            <div class="payment-methods">
                <div class="method-item" onclick="selectMethod('Bkash', this)">
                    <img src="https://raw.githubusercontent.com/Ariful-Islam-7/Payment-Icons/main/bkash.png" alt="Bkash">
                    <span>বিকাশ</span>
                </div>
                <div class="method-item" onclick="selectMethod('Nagad', this)">
                    <img src="https://raw.githubusercontent.com/Ariful-Islam-7/Payment-Icons/main/nagad.png" alt="Nagad">
                    <span>নগদ</span>
                </div>
                <div class="method-item" onclick="selectMethod('Rocket', this)">
                    <img src="https://raw.githubusercontent.com/Ariful-Islam-7/Payment-Icons/main/rocket.png" alt="Rocket">
                    <span>রকেট</span>
                </div>
            </div>

            <input type="number" id="amountInput" placeholder="টাকার পরিমাণ লিখুন">
            
            <button class="action-btn dep-btn" id="submitBtn" onclick="processAction()">কনফার্ম</button>
            <button class="action-btn" style="background:#475569; margin-top:10px;" onclick="closeModal()">বাতিল</button>
        </div>
    </div>

    <nav class="nav-bar">
        <a href="#" class="nav-item active"><i class="fas fa-home"></i>Home</a>
        <a href="#" class="nav-item"><i class="fas fa-gamepad"></i>Games</a>
        <a href="#" class="nav-item"><i class="fas fa-gift"></i>Promo</a>
        <a href="#" class="nav-item"><i class="fas fa-user-circle"></i>Profile</a>
    </nav>

    <script>
        let balance = 500.00;
        let currentMode = '';
        let selectedMethod = '';

        function updateUI() {
            document.getElementById('balanceDisplay').innerText = balance.toFixed(2);
        }

        function showModal(mode) {
            currentMode = mode;
            selectedMethod = '';
            document.getElementById('modalTitle').innerText = mode === 'deposit' ? 'ডিপোজিট করুন' : 'উইথড্র করুন';
            document.getElementById('submitBtn').style.background = mode === 'deposit' ? '#4caf50' : '#f44336';
            document.querySelectorAll('.method-item').forEach(i => i.classList.remove('active'));
            document.getElementById('actionModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('actionModal').style.display = 'none'; }

        function selectMethod(method, element) {
            selectedMethod = method;
            document.querySelectorAll('.method-item').forEach(i => i.classList.remove('active'));
            element.classList.add('active');
        }

        function processAction() {
            let amount = parseFloat(document.getElementById('amountInput').value);
            if(!selectedMethod) { alert("অনুগ্রহ করে বিকাশ, নগদ বা রকেট সিলেক্ট করুন!"); return; }
            if(!amount || amount <= 0) { alert("সঠিক পরিমাণ লিখুন!"); return; }

            if(currentMode === 'deposit') {
                balance += amount;
                alert(selectedMethod + " এর মাধ্যমে ৳" + amount + " ডিপোজিট সফল!");
            } else {
                if(balance >= amount) {
                    balance -= amount;
                    alert(selectedMethod + " এর মাধ্যমে ৳" + amount + " উইথড্র রিকোয়েস্ট পাঠানো হয়েছে!");
                } else {
                    alert("পর্যাপ্ত ব্যালেন্স নেই!");
                    return;
                }
            }
            updateUI();
            closeModal();
            document.getElementById('amountInput').value = "";
        }
    </script>
</body>
</html>
