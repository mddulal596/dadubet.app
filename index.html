<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DaduBet - Deposit/Withdraw</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-dark: #0f1621; --primary-blue: #2196f3; --text-main: #ffffff; }
        body { background: var(--bg-dark); color: var(--text-main); font-family: 'Poppins', sans-serif; padding-bottom: 80px; }
        
        /* ট্রানজেকশন বাটন */
        .wallet-actions { display: flex; gap: 10px; padding: 15px; justify-content: center; }
        .action-btn { flex: 1; padding: 10px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .dep-btn { background: #4caf50; color: white; }
        .wit-btn { background: #f44336; color: white; }

        /* মোডাল ডিজাইন */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: #1c2536; padding: 20px; border-radius: 12px; width: 80%; text-align: center; }
        .modal input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
    </style>
</head>
<body>

    <div style="text-align: center; padding: 20px;">
        <p style="color: #94a3b8; font-size: 12px;">আপনার বর্তমান ব্যালেন্স</p>
        <h2 id="balanceDisplay">৳ 500.00</h2>
    </div>

    <div class="wallet-actions">
        <button class="action-btn dep-btn" onclick="showModal('deposit')">ডিপোজিট</button>
        <button class="action-btn wit-btn" onclick="showModal('withdraw')">উইথড্র</button>
    </div>

    <div id="actionModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">টাকা যোগ করুন</h3>
            <input type="number" id="amountInput" placeholder="পরিমাণ লিখুন">
            <button class="action-btn dep-btn" onclick="processAction()">কনফার্ম</button>
            <button class="action-btn" style="background:#475569; margin-top:10px;" onclick="closeModal()">বাতিল</button>
        </div>
    </div>

    <script>
        let balance = 500.00;
        let currentMode = '';

        function showModal(mode) {
            currentMode = mode;
            document.getElementById('modalTitle').innerText = mode === 'deposit' ? 'ডিপোজিট করুন' : 'উইথড্র করুন';
            document.getElementById('actionModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('actionModal').style.display = 'none'; }

        function processAction() {
            let amount = parseFloat(document.getElementById('amountInput').value);
            if(amount > 0) {
                if(currentMode === 'deposit') balance += amount;
                else if(currentMode === 'withdraw') {
                    if(balance >= amount) balance -= amount;
                    else { alert("আপনার পর্যাপ্ত ব্যালেন্স নেই!"); return; }
                }
                document.getElementById('balanceDisplay').innerText = "৳ " + balance.toFixed(2);
                closeModal();
            }
        }
    </script>
</body>
</html>
