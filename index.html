<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DaduBet - Casino</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">DADU<span>BET</span></div>
        <div class="balance-box">৳ <span id="balanceDisplay">500.00</span></div>
    </header>

    <div class="wallet-actions">
        <button class="action-btn dep-btn" onclick="showModal('deposit')">ডিপোজিট</button>
        <button class="action-btn wit-btn" onclick="showModal('withdraw')">উইথড্র</button>
    </div>

    <div class="section-header">ক্যাসিনো গেম <i class="fas fa-search"></i></div>
    
    <main class="game-grid">
        <div class="game-card">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS9S9YvQ_V7V8zL3O8_7Z9B9Y3Y_V7V8zL3O8&s" alt="Sweet">
            <div class="game-label">Sweet Bonanza 1000</div>
        </div>
        <div class="game-card">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR6A8B9C1D2E3F4G5H6I7J8K9L0M1N2O3P4Q5&s" alt="Hades">
            <div class="game-label">Hades: Realm of Fortune</div>
        </div>
        <div class="game-card">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT1A2B3C4D5E6F7G8H9I0J1K2L3M4N5O6P7Q8&s" alt="Imperial">
            <div class="game-label">Imperial Hoard</div>
        </div>
        <div class="game-card">
            <span class="promo-badge">PROMO</span>
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR5A4B3C2D1E0F9G8H7I6J5K4L3M2N1O0P9Q8&s" alt="Olympus">
            <div class="game-label">Gates of Olympus</div>
        </div>
    </main>

    <div id="actionModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">ডিপোজিট</h3>
            <div class="payment-methods">
                <div class="method-item" onclick="selectMethod('Bkash', this)">
                    <img src="https://www.logo.wine/a/logo/BKash/BKash-Icon-Logo.wine.svg">
                    <span>বিকাশ</span>
                </div>
                <div class="method-item" onclick="selectMethod('Nagad', this)">
                    <img src="https://download.logo.wine/logo/Nagad/Nagad-Vertical-Logo.wine.png">
                    <span>নগদ</span>
                </div>
                <div class="method-item" onclick="selectMethod('Rocket', this)">
                    <img src="https://seeklogo.com/images/D/dutch-bangla-rocket-logo-B4D1CC458D-seeklogo.com.png">
                    <span>রকেট</span>
                </div>
            </div>

            <div id="numDisplay" class="num-display">
                <p style="font-size: 10px;">আমাদের নাম্বার: <b>01917044596</b></p>
            </div>

            <input type="number" id="amountInput" placeholder="টাকার পরিমাণ">
            
            <input type="text" id="trxInput" placeholder="ট্রানজেকশন আইডি (TrxID)">
            
            <input type="number" id="userPhoneInput" placeholder="আপনার বিকাশ/নগদ নাম্বার" style="display:none;">
            
            <button class="action-btn dep-btn" id="confirmBtn" onclick="processAction()">কনফার্ম</button>
            <button class="action-btn" style="background:#334155; margin-top:10px; color:white;" onclick="closeModal()">বাতিল</button>
        </div>
    </div>

    <nav class="nav-bar">
        <a href="#" class="nav-item active"><i class="fas fa-home"></i>Home</a>
        <a href="#" class="nav-item"><i class="fas fa-th-large"></i>Categories</a>
        <a href="#" class="nav-item"><i class="fas fa-heart"></i>My Casino</a>
        <a href="#" class="nav-item"><i class="fas fa-bars"></i>Menu</a>
    </nav>

    <script>
        let balance = 500.00;
        let mode = '';
        let selected = '';

        function showModal(m) {
            mode = m;
            selected = '';
            document.getElementById('modalTitle').innerText = m === 'deposit' ? 'ডিপোজিট করুন' : 'উইথড্র করুন';
            document.getElementById('numDisplay').style.display = 'none';
            document.getElementById('trxInput').style.display = m === 'deposit' ? 'block' : 'none';
            document.getElementById('userPhoneInput').style.display = m === 'withdraw' ? 'block' : 'none';
            document.querySelectorAll('.method-item').forEach(el => el.classList.remove('active'));
            document.getElementById('actionModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('actionModal').style.display = 'none'; }

        function selectMethod(name, el) {
            selected = name;
            document.querySelectorAll('.method-item').forEach(item => item.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('numDisplay').style.display = 'block';
        }

        function processAction() {
            let amt = parseFloat(document.getElementById('amountInput').value);
            if(!selected) { alert("মেথড সিলেক্ট করুন!"); return; }
            if(!amt || amt <= 0) { alert("সঠিক পরিমাণ লিখুন!"); return; }

            if(mode === 'deposit') {
                alert("ডিপোজিট রিকোয়েস্ট পাঠানো হয়েছে!");
            } else {
                let userPh = document.getElementById('userPhoneInput').value;
                if(!userPh) { alert("আপনার নাম্বারটি দিন!"); return; }
                if(balance >= amt) {
                    balance -= amt;
                    alert(userPh + " নাম্বারে উইথড্র রিকোয়েস্ট সফল!");
                } else { alert("ব্যালেন্স নেই!"); return; }
            }
            document.getElementById('balanceDisplay').innerText = balance.toFixed(2);
            closeModal();
        }
    </script>
</body>
</html>
