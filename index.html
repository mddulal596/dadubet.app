<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DaduBet - 01917044596</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">DADU<span>BET</span></div>
        <div class="balance-box">৳ <span id="balanceDisplay">500.00</span></div>
    </header>

    <div class="wallet-actions">
        <button class="action-btn dep-btn" onclick="showModal('deposit')">ডিপোজিট</button>
        <button class="action-btn wit-btn" onclick="showModal('withdraw')">উইথড্র</button>
    </div>

    <div id="actionModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">ডিপোজিট</h3>
            <p style="font-size: 11px; color: #94a3b8; margin-top: 5px;">পেমেন্ট মেথড বেছে নিন</p>
            
            <div class="payment-methods">
                <div class="method-item" onclick="selectMethod('Bkash', this)">
                    <img src="https://raw.githubusercontent.com/Ariful-Islam-7/Payment-Icons/main/bkash.png">
                    <span>বিকাশ</span>
                </div>
                <div class="method-item" onclick="selectMethod('Nagad', this)">
                    <img src="https://raw.githubusercontent.com/Ariful-Islam-7/Payment-Icons/main/nagad.png">
                    <span>নগদ</span>
                </div>
                <div class="method-item" onclick="selectMethod('Rocket', this)">
                    <img src="https://raw.githubusercontent.com/Ariful-Islam-7/Payment-Icons/main/rocket.png">
                    <span>রকেট</span>
                </div>
            </div>

            <div id="numSection" class="number-display">
                <p style="font-size: 10px;">নিচের নাম্বারে টাকা পাঠিয়ে ট্রানজেকশন ID দিন</p>
                <span id="targetNumber">01917044596</span>
            </div>

            <input type="number" id="amountInput" placeholder="টাকার পরিমাণ">
            <input type="text" id="trxInput" placeholder="TrxID (ট্রানজেকশন আইডি)">
            
            <button class="action-btn dep-btn" id="submitBtn" onclick="processAction()">কনফার্ম</button>
            <button class="action-btn" style="background:#475569; margin-top:10px;" onclick="closeModal()">বাতিল</button>
        </div>
    </div>

    <nav class="nav-bar">
        <a href="#" class="nav-item active"><i class="fas fa-home"></i>Home</a>
        <a href="#" class="nav-item"><i class="fas fa-gamepad"></i>Games</a>
        <a href="#" class="nav-item"><i class="fas fa-user-circle"></i>Profile</a>
    </nav>

    <script>
        let balance = 500.00;
        let currentMode = '';
        let selectedMethod = '';

        function showModal(mode) {
            currentMode = mode;
            selectedMethod = '';
            document.getElementById('modalTitle').innerText = mode === 'deposit' ? 'ডিপোজিট করুন' : 'উইথড্র করুন';
            document.getElementById('numSection').style.display = 'none';
            document.getElementById('trxInput').style.display = mode === 'deposit' ? 'block' : 'none';
            document.getElementById('actionModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('actionModal').style.display = 'none'; }

        function selectMethod(method, el) {
            selectedMethod = method;
            document.querySelectorAll('.method-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('numSection').style.display = 'block';
        }

        function processAction() {
            let amount = parseFloat(document.getElementById('amountInput').value);
            if(!selectedMethod) { alert("মেথড সিলেক্ট করুন!"); return; }
            if(!amount || amount <= 0) { alert("পরিমাণ লিখুন!"); return; }

            if(currentMode === 'deposit') {
                alert(selectedMethod + " নাম্বারে ৳" + amount + " পাঠানোর রিকোয়েস্ট সফল! অ্যাডমিন ভেরিফাই করবে।");
            } else {
                if(balance >= amount) {
                    balance -= amount;
                    alert("উইথড্র রিকোয়েস্ট সফল হয়েছে!");
                } else { alert("ব্যালেন্স নেই!"); return; }
            }
            document.getElementById('balanceDisplay').innerText = balance.toFixed(2);
            closeModal();
        }
    </script>
</body>
</html>
