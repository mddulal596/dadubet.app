<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DaduBet - All-in-One Gaming</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">DADU<span>BET</span></div>
        <div class="balance-box">
            <i class="fas fa-wallet"></i> ৳ <span id="balanceDisplay">500.00</span>
        </div>
    </header>

    <div class="promo-banner">
        <h2>লাকি ড্র শুরু হয়েছে!</h2>
        <p>জিতুন বিশাল আকর্ষণীয় পুরষ্কার</p>
        <i class="fas fa-trophy"></i>
    </div>

    <div class="wallet-actions">
        <button class="action-btn dep-btn" onclick="showModal('deposit')">ডিপোজিট</button>
        <button class="action-btn wit-btn" onclick="showModal('withdraw')">উইথড্র</button>
    </div>

    <div class="game-section">
        <h3><i class="fas fa-dice"></i> লাকি নাম্বার গেম</h3>
        <div class="input-group">
            <input type="number" id="userGuess" min="1" max="10" placeholder="0">
            <button class="play-btn" onclick="playLuckyGame()">Play</button>
        </div>
        <div id="result"></div>
    </div>

    <div class="grid-title">জনপ্রিয় গেম <span>সব দেখুন</span></div>

    <main class="game-grid">
        <div class="game-card">
            <img src="https://picsum.photos/id/102/300/200" alt="G">
            <div class="game-info">Sweet Bonanza</div>
        </div>
        <div class="game-card">
            <img src="https://picsum.photos/id/103/300/200" alt="G">
            <div class="game-info">Gates of Olympus</div>
        </div>
    </main>

    <div id="actionModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">টাকা যোগ করুন</h3>
            <input type="number" id="amountInput" placeholder="পরিমাণ লিখুন">
            <button class="action-btn dep-btn" onclick="processAction()">কনফার্ম</button>
            <button class="action-btn" style="background:#475569; margin-top:10px;" onclick="closeModal()">বাতিল</button>
        </div>
    </div>

    <nav class="nav-bar">
        <a href="#" class="nav-item active"><i class="fas fa-home"></i>Home</a>
        <a href="#" class="nav-item"><i class="fas fa-gamepad"></i>Games</a>
        <a href="#" class="nav-item"><i class="fas fa-gift"></i>Promo</a>
        <a href="#" class="nav-item"><i class="fas fa-user-circle"></i>Profile</a>
    </nav>

    <script>
        let balance = 500.00;
        let currentMode = '';

        // ব্যালেন্স আপডেট ফাংশন
        function updateUI() {
            document.getElementById('balanceDisplay').innerText = balance.toFixed(2);
        }

        // মোডাল কন্ট্রোল
        function showModal(mode) {
            currentMode = mode;
            document.getElementById('modalTitle').innerText = mode === 'deposit' ? 'ডিপোজিট করুন' : 'উইথড্র করুন';
            document.getElementById('actionModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('actionModal').style.display = 'none'; }

        // ডিপোজিট ও উইথড্র লজিক
        function processAction() {
            let amount = parseFloat(document.getElementById('amountInput').value);
            if(amount > 0) {
                if(currentMode === 'deposit') {
                    balance += amount;
                } else if(currentMode === 'withdraw') {
                    if(balance >= amount) balance -= amount;
                    else { alert("পর্যাপ্ত ব্যালেন্স নেই!"); return; }
                }
                updateUI();
                closeModal();
                document.getElementById('amountInput').value = "";
            }
        }

        // লাকি গেম লজিক
        function playLuckyGame() {
            const guess = document.getElementById('userGuess').value;
            if(!guess || balance < 10) { alert("নাম্বার দিন অথবা ব্যালেন্স চেক করুন!"); return; }
            
            balance -= 10;
            const winNum = Math.floor(Math.random() * 10) + 1;
            if(parseInt(guess) === winNum) {
                balance += 50;
                document.getElementById('result').innerText = "উইন! সঠিক নাম্বার: " + winNum;
                document.getElementById('result').style.color = "#4caf50";
            } else {
                document.getElementById('result').innerText = "লস! সঠিক নাম্বার: " + winNum;
                document.getElementById('result').style.color = "#f44336";
            }
            updateUI();
        }
    </script>
</body>
</html>
