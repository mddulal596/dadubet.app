<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Classic Slot Machine</title>
    <style>
        body { background: #121212; color: white; text-align: center; font-family: sans-serif; }
        .slot-container { margin-top: 50px; background: #333; display: inline-block; padding: 20px; border: 5px solid gold; border-radius: 10px; }
        .slot { font-size: 80px; display: inline-block; width: 100px; height: 120px; background: white; margin: 5px; color: black; border-radius: 5px; line-height: 120px; }
        button { padding: 15px 30px; font-size: 20px; background: gold; border: none; cursor: pointer; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <h1>🎰 গোল্ডেন স্লট 🎰</h1>
    <div class="slot-container">
        <div id="slot1" class="slot">❓</div>
        <div id="slot2" class="slot">❓</div>
        <div id="slot3" class="slot">❓</div>
    </div>
    <br>
    <button onclick="spin()">স্পিন করুন</button>
    <h2 id="msg"></h2>

    <script>
        const symbols = ['🍒', '🍋', '🔔', '💎', '⭐', '🍎'];
        function spin() {
            const s1 = symbols[Math.floor(Math.random() * symbols.length)];
            const s2 = symbols[Math.floor(Math.random() * symbols.length)];
            const s3 = symbols[Math.floor(Math.random() * symbols.length)];
            
            document.getElementById('slot1').innerText = s1;
            document.getElementById('slot2').innerText = s2;
            document.getElementById('slot3').innerText = s3;

            if(s1 === s2 && s2 === s3) {
                document.getElementById('msg').innerText = "জ্যাকপট! আপনি জিতেছেন! 🎉";
            } else {
                document.getElementById('msg').innerText = "আবার চেষ্টা করুন।";
            }
        }
    </script>
</body>
</html>
